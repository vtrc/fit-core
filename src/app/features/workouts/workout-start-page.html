<main >
  <app-page-header eyebrow="ENTRENAMIENTOS" title="Inicia tu entrenamiento." lede="Elige una rutina guardada para comenzar." />

  @if (error(); as errorMessage) {
    <p class="banner error" role="alert">{{ errorMessage }}</p>
  }

  @if (loading()) {
    <section class="grid" aria-label="Cargando rutinas">
      @for (_ of [1,2,3]; track $index) {
        <article class="card routine-card">
          <div class="routine-body">
            <div class="skeleton" style="height:0.7rem;width:35%"></div>
            <div class="skeleton" style="height:1.25rem;width:60%;margin:var(--space-2) 0"></div>
            <div class="skeleton" style="height:0.9rem;width:80%;margin-bottom:0.35rem"></div>
            <div class="skeleton" style="height:0.9rem;width:45%"></div>
          </div>
          <div class="routine-actions">
            <div class="skeleton" style="height:44px;border-radius:var(--radius-md)"></div>
          </div>
        </article>
      }
    </section>
  } @else if (routines().length === 0) {
    <app-empty-state
      title="Aún no tienes rutinas."
      description="Empieza con un plan guardado para que tus próximos entrenamientos tengan estructura."
      actionText="Crea tu primera rutina"
      actionRoute="/routines/new"
    />
  } @else {
    <section class="grid">
      @for (routine of routines(); track routine.id) {
        <app-routine-card
          [eyebrow]="'Actualizada ' + formatDate(routine.updatedAt)"
          [name]="routine.name"
          [description]="routine.description"
        >
          <button
            class="btn-primary"
            type="button"
            (click)="startRoutine(routine)"
            [disabled]="saving() || startingRoutineId() === routine.id"
          >
            {{ startingRoutineId() === routine.id ? 'Iniciando…' : 'Empezar' }}
          </button>
          <button type="button" class="btn-secondary" (click)="deleteRoutine(routine.id)" [disabled]="deletingId() === routine.id">
            {{ deletingId() === routine.id ? 'Borrando…' : 'Borrar' }}
          </button>
        </app-routine-card>
      }
    </section>
  }
</main>
