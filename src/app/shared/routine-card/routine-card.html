<div class="swipe-container" [class.swipeable]="swipeable()">
  <div class="swipe-background">
    <button type="button" class="trash-btn" (click)="onDelete()" aria-label="Eliminar rutina">
      <svg class="trash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    </button>
  </div>
  <article class="card routine-card" [appSwipeToDelete]="swipeable()">
    @if (dragHandle()) {
      <button type="button" class="drag-handle" cdkDragHandle aria-label="Reordenar rutina">
        <svg class="grip-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <circle cx="6" cy="3" r="1.5"/>
          <circle cx="10" cy="3" r="1.5"/>
          <circle cx="6" cy="8" r="1.5"/>
          <circle cx="10" cy="8" r="1.5"/>
          <circle cx="6" cy="13" r="1.5"/>
          <circle cx="10" cy="13" r="1.5"/>
        </svg>
      </button>
    }
    <div class="routine-body">
      <p class="eyebrow">{{ eyebrow() }}</p>
      <h2>{{ name() }}</h2>
      @if (description(); as desc) {
        <p class="routine-desc">{{ desc }}</p>
      }
    </div>
    <div class="routine-actions">
      <ng-content />
    </div>
  </article>
</div>
